<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6ae5d5"/>
    </linearGradient>
    <linearGradient id="sparkle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0e9ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Full-bleed background (maskable = no rounding, content must fit in center 80%) -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>

  <!-- Content scaled to ~65% so it stays inside the 80% safe area -->
  <g transform="translate(256 256) scale(0.65) translate(-256 -256)">
    <g filter="url(#glow)" transform="translate(256 256)">
      <path d="M 0 -130 L 22 -22 L 130 0 L 22 22 L 0 130 L -22 22 L -130 0 L -22 -22 Z"
            fill="url(#sparkle)"/>
    </g>
    <g fill="#ffffff" opacity="0.9">
      <path d="M 388 124 L 396 144 L 416 152 L 396 160 L 388 180 L 380 160 L 360 152 L 380 144 Z" opacity="0.85"/>
      <path d="M 124 388 L 130 402 L 144 408 L 130 414 L 124 428 L 118 414 L 104 408 L 118 402 Z" opacity="0.7"/>
      <circle cx="120" cy="200" r="5" opacity="0.6"/>
      <circle cx="392" cy="312" r="5" opacity="0.6"/>
    </g>
  </g>
</svg>
