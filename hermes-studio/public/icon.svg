<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6ae5d5"/>
    </linearGradient>
    <linearGradient id="sparkle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0e9ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Subtle inner glow ring -->
  <rect x="20" y="20" width="472" height="472" rx="96" ry="96"
        fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>

  <!-- Big central sparkle -->
  <g filter="url(#glow)" transform="translate(256 256)">
    <!-- 4-pointed star (sparkle) -->
    <path d="M 0 -130 L 22 -22 L 130 0 L 22 22 L 0 130 L -22 22 L -130 0 L -22 -22 Z"
          fill="url(#sparkle)"/>
  </g>

  <!-- Small accent sparkles -->
  <g fill="#ffffff" opacity="0.9">
    <!-- Top-right small sparkle -->
    <path d="M 388 124 L 396 144 L 416 152 L 396 160 L 388 180 L 380 160 L 360 152 L 380 144 Z" opacity="0.85"/>
    <!-- Bottom-left small sparkle -->
    <path d="M 124 388 L 130 402 L 144 408 L 130 414 L 124 428 L 118 414 L 104 408 L 118 402 Z" opacity="0.7"/>
    <!-- Top-left tiny sparkle -->
    <circle cx="120" cy="200" r="5" opacity="0.6"/>
    <!-- Bottom-right tiny sparkle -->
    <circle cx="392" cy="312" r="5" opacity="0.6"/>
  </g>
</svg>
