<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8b5cf6">
  <title>Hors ligne — Hermes Studio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: radial-gradient(ellipse at top, #1a1530 0%, #0a0a0f 60%);
      color: #f4f4f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    main {
      max-width: 420px; text-align: center;
    }
    .logo {
      width: 96px; height: 96px; margin: 0 auto 32px;
      background: linear-gradient(135deg, #8b5cf6 0%, #6ae5d5 100%);
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 20px 60px rgba(139, 92, 246, 0.35);
    }
    .logo svg { width: 56px; height: 56px; }
    h1 { font-size: 1.75rem; margin-bottom: 12px; font-weight: 600; }
    p { color: #a1a1aa; line-height: 1.6; margin-bottom: 28px; }
    button {
      background: rgba(255,255,255,0.06);
      color: #f4f4f5;
      border: 1px solid rgba(255,255,255,0.12);
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { background: rgba(255,255,255,0.1); border-color: #8b5cf6; }
  </style>
</head>
<body>
  <main>
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/>
        <circle cx="12" cy="12" r="4"/>
      </svg>
    </div>
    <h1>Hors ligne</h1>
    <p>La connexion avec Hermes Studio a été perdue. Vérifiez votre réseau et réessayez.</p>
    <button onclick="window.location.reload()">Réessayer</button>
  </main>
</body>
</html>
