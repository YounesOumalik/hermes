# ============================================================================
# docker-compose.yml — Stack d'orchestration multi-agents
# ----------------------------------------------------------------------------
# Architecture 4 couches Hermes OS :
#   1. hermes-studio    — Next.js UI (:3000)
#   2. Hermes Gateway   — BFF Next.js interne (route.ts /api/hermes/[...path])
#   3a. hermes-core     — Orchestrateur Python FastAPI (:8002) [Phase 2]
#   3b. n8n             — Moteur automatisation (:5678)
#   3c. Postgres hôte   — DB (:5432, host.docker.internal)
#   3d. mcp-server      — MCP filesystem/github/terminal (:3100)
#   4. hermes-llm-proxy — Proxy LLM OpenAI-compat (:8001)
#
# Réseau : orchestration-net (bridge interne nommé)
# Volumes : hermes_data, n8n_data, mcp_workspace, hermes_core_db
#
# Deploiement : docker compose -f docker-compose.yml up -d --build
# ============================================================================

networks:
  orchestration-net:
    name: orchestration-net
    external: true
  coolify:
    name: coolify
    external: true

volumes:
  hermes_data:
    driver: local
  n8n_data:
    driver: local
  mcp_workspace:
    driver: local
  hermes_core_db:
    driver: local

services:
  # --------------------------------------------------------------------------
  # Hermes Daemon — Backend agent IA (FastAPI)
  # --------------------------------------------------------------------------
  hermes-daemon:
    build:
      context: ./hermes-daemon
      dockerfile: Dockerfile
    container_name: hermes-daemon
    restart: unless-stopped
    expose:
      - "8001"
    # Binding externe retiré — atteint uniquement via le BFF (orchestration-net)
    # Le port 8001 est désormais servi par hermes-llm-proxy (Phase 1)
    # Le daemon garde son port interne pour transition progressive (sera supprimé Phase 2)
    environment:
      - HERMES_ENV=production
      - HERMES_PORT=8001
      - HERMES_JWT_SECRET=${HERMES_JWT_SECRET}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_BASE_URL=https://api.minimax.chat/v1
      - MINIMAX_MODEL=${MINIMAX_MODEL:-abab6.5s-chat}
      - N8N_WEBHOOK_BASE_URL=${N8N_WEBHOOK_BASE_URL:-http://n8n:5678/webhook}
      - MCP_SERVER_URL=http://mcp-server:3100
      - POSTGRES_HOST=host.docker.internal
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-hermes}
      - POSTGRES_USER=${POSTGRES_USER:-younes}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - hermes_data:/data
      - ./hermes-daemon:/app
    networks:
      - orchestration-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 384m
        reservations:
          memory: 192m

  # --------------------------------------------------------------------------
  # Hermes LLM Proxy — Refactor du daemon (Phase 1 du plan Hermes OS)
  # OpenAI-compat /v1/models, /v1/chat/completions (SSE), Model Router
  # --------------------------------------------------------------------------
  hermes-llm-proxy:
    build:
      context: ./hermes-llm-proxy
      dockerfile: Dockerfile
    container_name: hermes-llm-proxy
    restart: unless-stopped
    expose:
      - "8001"
    # Pas de binding externe — atteint uniquement via le BFF (orchestration-net)
    environment:
      - HERMES_ENV=production
      - HERMES_PORT=8001
      - HERMES_SERVICE_TOKEN=${HERMES_SERVICE_TOKEN:-}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_BASE_URL=https://api.minimax.chat/v1
      - MINIMAX_DEFAULT_MODEL=${MINIMAX_DEFAULT_MODEL:-MiniMax-M2.7}
    networks:
      - orchestration-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 384m
        reservations:
          memory: 192m

  # --------------------------------------------------------------------------
  # Hermes Studio — Interface graphique (Next.js)
  # --------------------------------------------------------------------------
  hermes-studio:
    build:
      context: ./hermes-studio
      dockerfile: Dockerfile
    container_name: hermes-studio
    restart: unless-stopped
    expose:
      - "3000"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - HERMES_DAEMON_URL=http://hermes-llm-proxy:8001
      - HERMES_CORE_URL=http://hermes-core:8002
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://hermes.eaumalik.com}
      - NEXT_PUBLIC_DAEMON_URL=${NEXT_PUBLIC_DAEMON_URL:-http://hermes-llm-proxy:8001}
      - HERMES_ADMIN_USERNAME=${HERMES_ADMIN_USERNAME:-admin}
      - HERMES_ADMIN_PASSWORD_HASH=${HERMES_ADMIN_PASSWORD_HASH}
      - HERMES_JWT_SECRET=${HERMES_JWT_SECRET}
      - HERMES_SESSION_SECRET=${HERMES_SESSION_SECRET}
      - HERMES_ALLOWED_ORIGINS=${HERMES_ALLOWED_ORIGINS:-https://hermes.eaumalik.com}
    env_file:
      - /opt/hermes-orchestration/.env
    depends_on:
      hermes-llm-proxy:
        condition: service_healthy
    networks:
      - orchestration-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/login', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m

  # --------------------------------------------------------------------------
  # Hermes Core — Orchestrateur (Phase 2 du plan Hermes OS)
  # FastAPI + SQLAlchemy + Alembic + gunicorn (2 workers)
  # --------------------------------------------------------------------------
  hermes-core:
    build:
      context: ./hermes-core
      dockerfile: Dockerfile
    container_name: hermes-core
    restart: unless-stopped
    expose:
      - "8002"
    # Pas de binding externe — atteint uniquement via le BFF (orchestration-net)
    # env vars lues depuis /opt/hermes-orchestration/.env via le deploy script
    # (le webhook deploy fait `set -a && source` avant `docker compose up`)
    environment:
      - HERMES_ENV=production
      - HERMES_CORE_PORT=8002
      - HERMES_JWT_SECRET=${HERMES_JWT_SECRET:-}
      - DATABASE_URL=${DATABASE_URL:-}
      - HERMES_LLM_PROXY_URL=http://hermes-llm-proxy:8001
      - HERMES_LLM_PROXY_TOKEN=${HERMES_SERVICE_TOKEN:-}
      - MCP_SERVER_URL=http://mcp-server:3100
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN:-}
      - N8N_WEBHOOK_BASE_URL=${N8N_WEBHOOK_BASE_URL:-http://n8n:5678/webhook}
    volumes:
      - /opt/hermes-orchestration/.env:/opt/hermes-orchestration/.env:ro
      - hermes_core_db:/var/lib/hermes-core
      - ./hermes-core:/app
    networks:
      - orchestration-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      hermes-llm-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 768m
        reservations:
          memory: 512m

  # --------------------------------------------------------------------------
  # n8n — Moteur d'automatisation
  # --------------------------------------------------------------------------
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    expose:
      - "5678"
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_HOST=0.0.0.0
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_RUNNERS_MODE=internal
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=host.docker.internal
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-hermes}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-younes}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://169.58.30.70:5678}
      - GENERIC_TIMEZONE=Europe/Paris
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - orchestration-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1g
        reservations:
          memory: 512m

  # --------------------------------------------------------------------------
  # MCP Server — Serveur Model Context Protocol (Node.js)
  # --------------------------------------------------------------------------
  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: mcp-server
    restart: unless-stopped
    expose:
      - "3100"
    ports:
      - "127.0.0.1:3100:3100"
    environment:
      - MCP_PORT=3100
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - WORKSPACE_DIR=/workspace
      - LOG_LEVEL=info
    volumes:
      - mcp_workspace:/workspace
    networks:
      - orchestration-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512m
        reservations:
          memory: 256m
