networks:
  agentai-net:
    name: agentai-net

volumes:
  postgres_data:
  redis_data:
  open_webui_data:

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      - ENABLE_OAUTH_SIGNUP=True
      # Ne PAS stocker la config OAuth en DB (elle écraserait les env vars
      # au redémarrage). Les env vars GOOGLE_* et OAUTH_* ont toujours priorité.
      - ENABLE_OAUTH_PERSISTENT_CONFIG=False
      # Fusionner les comptes par email quand le sub OAuth change (ex: migration
      # OIDC → Google natif). Sans cette option, un user créé avec le provider OIDC
      # ne pourra pas se reconnecter avec le provider Google → "email already registered".
      - OAUTH_MERGE_ACCOUNTS_BY_EMAIL=True
      # Provider Google NATIF (vs OIDC générique). Avec GOOGLE_CLIENT_ID/SECRET,
      # Open WebUI affiche le bouton "Continuer avec Google" + le logo Google officiel
      # (au lieu du bouton "Continuer avec SSO" générique). Cf. docs/OPENWEBUI_PROVIDERS.md.
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_OAUTH_SCOPE=openid email profile
      # Forcer la redirect_uri pour qu'elle corresponde EXACTEMENT à celle déclarée
      # dans Google Cloud Console → Credentials → OAuth 2.0 Client IDs.
      # Avec le provider Google natif, l'endpoint de callback est /oauth/google/callback.
      - GOOGLE_REDIRECT_URI=https://agentai.smartefp.com/oauth/google/callback
      - WEBUI_SECRET_KEY=${JWT_SECRET}
      - WEBUI_AUTH=True
      - DEFAULT_USER_ROLE=pending
      # NOTE: OPENAI_API_BASE_URL pointe vers hermes-llm-proxy, MAIS ce proxy
      # utilise un format propriétaire (model_config_id: UUID) incompatible avec
      # l'API OpenAI standard attendue par Open WebUI. On configure donc MiniMax
      # directement via l'UI Admin (voir docs/OPENWEBUI_PROVIDERS.md).
      # Variable conservée pour référence; peut être retirée quand le proxy sera
      # réécrit en format OpenAI-compat.
      - OPENAI_API_BASE_URL=http://llm-proxy:8001/v1
    volumes:
      - open_webui_data:/app/backend/data
    networks:
      agentai-net:
        ipv4_address: 172.18.0.8
    healthcheck:
      # Open WebUI expose /health (retourne 200 OK) une fois l'app initialisée.
      # start-period généreux : le 1er démarrage télécharge le modèle embedding
      # sentence-transformers/all-MiniLM-L6-v2 (~80MB) depuis HuggingFace,
      # ce qui prend 5-10 min sur un VPS modeste.
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s
    deploy:
      resources:
        limits:
          # 2GiB au lieu de 1GiB — observé ~741MiB à vide, peut monter à 1.5GiB+
          # avec plusieurs utilisateurs actifs et le modèle embedding en RAM.
          memory: 2048m

  # ---------------------------------------------------------------------------
# llm-proxy : service LEGACY (format propriétaire, incompatible Open WebUI)
# Conservé temporairement pour les outils CLI et debugging. Pas utilisé par
# Open WebUI (qui parle directement à MiniMax/Zen via l'UI Admin).
# Pour le désactiver : commenter ce bloc OU ajouter un profil `legacy`.
# ---------------------------------------------------------------------------
  llm-proxy:
    build: ./hermes-llm-proxy
    container_name: llm-proxy
    restart: unless-stopped
    profiles: ["legacy"]  # Démarrable via: docker compose --profile legacy up -d
    expose:
      - "8001"
    env_file:
      - .env
    environment:
      - HERMES_ENV=${HERMES_ENV}
      - DATABASE_URL=postgresql+asyncpg://agentai:${DB_PASSWORD}@postgres:5432/agentai
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agentai-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 384m

  postgres:
    image: postgres:16-alpine
    container_name: agentai-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=agentai
      - POSTGRES_USER=agentai
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - agentai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentai"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1536m

  redis:
    image: redis:7-alpine
    container_name: agentai-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - agentai-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
