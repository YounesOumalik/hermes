networks:
  agentai-net:
    name: agentai-net

volumes:
  postgres_data:
  redis_data:
  agentai_uploads:

services:
  agentai-frontend:
    build:
      context: ./hermes-nebula
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    container_name: agentai-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    depends_on:
      agentai-api:
        condition: service_healthy
    networks:
      agentai-net:
        ipv4_address: 172.18.0.8
    deploy:
      resources:
        limits:
          memory: 512m

  agentai-api:
    build: ./hermes-nebula-api
    container_name: agentai-api
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - HERMES_ENV=${HERMES_ENV}
      - DATABASE_URL=postgresql+asyncpg://agentai:${DB_PASSWORD}@postgres:5432/agentai
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES}
      - JWT_REFRESH_EXPIRE_DAYS=${JWT_REFRESH_EXPIRE_DAYS}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - SUPERADMIN_EMAIL=${SUPERADMIN_EMAIL}
      - FRONTEND_URL=${FRONTEND_URL}
      - UPLOAD_DIR=/uploads
    volumes:
      - agentai_uploads:/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      agentai-net:
        ipv4_address: 172.18.0.6
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 768m

  llm-proxy:
    build: ./hermes-llm-proxy
    container_name: llm-proxy
    restart: unless-stopped
    expose:
      - "8001"
    env_file:
      - .env
    environment:
      - HERMES_ENV=${HERMES_ENV}
      - DATABASE_URL=postgresql+asyncpg://agentai:${DB_PASSWORD}@postgres:5432/agentai
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agentai-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 384m

  celery-worker:
    build: ./hermes-nebula-api
    container_name: celery-worker
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker -l info -c 2 --without-heartbeat
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://agentai:${DB_PASSWORD}@postgres:5432/agentai
      - REDIS_URL=redis://redis:6379/0
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - HERMES_ENV=${HERMES_ENV}
    depends_on:
      - redis
      - postgres
    networks:
      - agentai-net
    deploy:
      resources:
        limits:
          memory: 512m

  celery-beat:
    build: ./hermes-nebula-api
    container_name: celery-beat
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat -l info --scheduler celery.beat:PersistentScheduler
    environment:
      - DATABASE_URL=postgresql+asyncpg://agentai:${DB_PASSWORD}@postgres:5432/agentai
      - REDIS_URL=redis://redis:6379/0
      - HERMES_ENV=${HERMES_ENV}
    depends_on:
      - redis
    networks:
      - agentai-net
    deploy:
      resources:
        limits:
          memory: 128m

  postgres:
    image: postgres:16-alpine
    container_name: agentai-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=agentai
      - POSTGRES_USER=agentai
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - agentai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentai"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1536m

  redis:
    image: redis:7-alpine
    container_name: agentai-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - agentai-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
