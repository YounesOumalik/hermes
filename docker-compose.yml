networks:
  agentai-net:
    name: agentai-net

volumes:
  postgres_data:
  redis_data:
  open_webui_data:

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      - ENABLE_OAUTH_SIGNUP=True
      - OAUTH_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - OAUTH_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - OPENID_PROVIDER_URL=https://accounts.google.com/.well-known/openid-configuration
      # Forcer la redirect_uri pour qu'elle corresponde EXACTEMENT à celle déclarée
      # dans Google Cloud Console → Credentials → OAuth 2.0 Client IDs.
      # Sans cette var, Open WebUI reconstruit l'URL depuis le header Host (peut
      # changer selon le proxy) → erreurs "redirect_uri_mismatch".
      - OAUTH_REDIRECT_URI=https://agentai.smartefp.com/oauth/oidc/callback
      - WEBUI_SECRET_KEY=${JWT_SECRET}
      - WEBUI_AUTH=True
      - DEFAULT_USER_ROLE=pending
      # NOTE: OPENAI_API_BASE_URL pointe vers hermes-llm-proxy, MAIS ce proxy
      # utilise un format propriétaire (model_config_id: UUID) incompatible avec
      # l'API OpenAI standard attendue par Open WebUI. On configure donc MiniMax
      # directement via l'UI Admin (voir docs/OPENWEBUI_MINIMAX_SETUP.md).
      # Variable conservée pour référence; peut être retirée quand le proxy sera
      # réécrit en format OpenAI-compat.
      - OPENAI_API_BASE_URL=http://llm-proxy:8001/v1
    volumes:
      - open_webui_data:/app/backend/data
    networks:
      agentai-net:
        ipv4_address: 172.18.0.8
    deploy:
      resources:
        limits:
          memory: 1024m

  llm-proxy:
    build: ./hermes-llm-proxy
    container_name: llm-proxy
    restart: unless-stopped
    expose:
      - "8001"
    env_file:
      - .env
    environment:
      - HERMES_ENV=${HERMES_ENV}
      - DATABASE_URL=postgresql+asyncpg://agentai:${DB_PASSWORD}@postgres:5432/agentai
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agentai-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 384m

  postgres:
    image: postgres:16-alpine
    container_name: agentai-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=agentai
      - POSTGRES_USER=agentai
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - agentai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentai"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1536m

  redis:
    image: redis:7-alpine
    container_name: agentai-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - agentai-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
